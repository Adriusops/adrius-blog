<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    circle.bg  { fill: #FFFCF1; }
    circle.dot { fill: #13100A; }
    @media (prefers-color-scheme: dark) {
      circle.bg  { fill: #13100A; }
      circle.dot { fill: #FFFCF1; }
