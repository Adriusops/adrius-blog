baseURL = 'https://adriusops.github.io/adrius-blog/'
languageCode = 'fr-FR'
title = 'adrius.blog — Cloud Sec Write-ups'
theme = 'adrius-theme'

disableKinds = ["taxonomy", "term"]

[params]
  showIntroContentOnHomepage = false
  showPostsOnHomepage = true
  author      = "adrius"
  description = "Journal de bord d'un mec qui apprend la sécu cloud. Write-ups CloudGoat, labs AWS IAM/VPC, et les loupés que personne ne montre."
  keywords    = ["cloud security", "AWS", "CloudGoat", "IAM", "VPC", "write-up", "pentest cloud"]

  enableGoogleFonts = false

[markup]
  [markup.highlight]
    codeFences         = true
    guessSyntax        = true
    noClasses          = false
    style              = "monokai"
    tabWidth           = 2
    lineNos            = false
    lineNumbersInTable = false

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "write-ups"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "à propos"
    url = "/about/"
    weight = 20
