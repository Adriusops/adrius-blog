baseURL = 'https://adrius.blog/'
languageCode = 'fr-FR'
title = 'adrius.blog — craft · code · design'
theme = 'adrius-theme'

disableKinds = ["taxonomy", "term"]

[params]
  showIntroContentOnHomepage = false
  showPostsOnHomepage = true
  author      = "adrius"
  description = "Journal d'un créateur. Ce que je construis, ce que j'apprends, ce que ça fait de finir vraiment quelque chose."
  keywords    = ["craft", "code", "design", "product", "logiciel", "interfaces", "blog"]

  enableGoogleFonts = false

[markup]
  [markup.highlight]
    codeFences         = true
    guessSyntax        = true
    noClasses          = false
    style              = "monokai"
    tabWidth           = 2
    lineNos            = false
    lineNumbersInTable = false

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "articles"
    url = "/posts/"
    weight = 10

[[menu.main]]
    identifier = "about"
    name = "à propos"
    url = "/about/"
    weight = 20
